config setup
    uniqueids=no

conn yukivpn-l2tp
    keyexchange=ikev1
    type=transport
    authby=secret
    left=%any
    leftid=%any
    leftprotoport=17/1701
    right=%any
    rightid=%any
    rightprotoport=17/1701
    ike=aes128-sha1-modp2048,aes128-sha1-modp1024,3des-sha1-modp1024!
    esp=aes128-sha1,3des-sha1!
    forceencaps=yes
    auto=add

